<header class="fixed inset-x-0 top-0 z-40 px-4 pt-4 md:px-6">
  <div class="mx-auto flex max-w-6xl items-center justify-between rounded-full border border-[var(--border-color)] bg-[var(--surface-color)]/80 px-4 py-3 shadow-soft backdrop-blur md:px-6">
    <a (click)="closeMenu()" class="font-display text-xl tracking-[0.35em] md:text-2xl" routerLink="/">{{ logotext }}</a>
    <div class="flex items-center gap-3">
      <app-login></app-login>
      <app-theme-toggle></app-theme-toggle>
      <button
        type="button"
        aria-label="Toggle menu"
        (click)="toggleMenu()"
        class="flex items-center justify-center"
      >
        @if (isMenuOpen()) {
          <mat-icon style="font-size: 32px; width: 32px; height: 32px;">close</mat-icon>
<!--          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>-->
        } @else {
          <mat-icon style="font-size: 32px; width: 24px; height: 32px;">menu</mat-icon>
<!--          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>-->
        }
      </button>
    </div>
  </div>
</header>
<div
  class="fixed inset-0 z-30 transition"
  [class.pointer-events-auto]="isMenuOpen()"
  [class.opacity-100]="isMenuOpen()"
  [class.pointer-events-none]="!isMenuOpen()"
  [class.opacity-0]="!isMenuOpen()"
>
  <div class="absolute inset-0 bg-[var(--overlay-color)] backdrop-blur-md" (click)="closeMenu()"></div>
  <div class="relative mx-auto flex min-h-screen max-w-6xl flex-col justify-between px-6 pb-8 pt-28 md:px-10 md:pt-36">
    <nav class="card-surface px-6 py-8 md:px-10 md:py-12">
      <ul class="space-y-4 md:space-y-6">
        @for (item of navItems; track item) {
          <li class="text-3xl md:text-5xl hover:text-[var(--accent-color)]"
              [routerLink]="item[0]"
              (click)="closeMenu()"
              routerLinkActive="text-[var(--color-red)]"
              [routerLinkActiveOptions]="{ exact: true }"
          >
              {{item[1]}}
          </li>
        }
      </ul>
    </nav>
    <div class="flex flex-col gap-6 text-sm text-[var(--text-muted)] md:flex-row md:items-center md:justify-between">
      <div class="flex flex-wrap gap-4">
        @for (item of socialprofils; track item) {
          <a [href]="item.url" target="_blank" rel="noopener noreferrer" class="social-link">
            {{item.name}}
          </a>
        }
      </div>
      <p>copyright — {{logotext}}</p>
    </div>
  </div>
</div>
