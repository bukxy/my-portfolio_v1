  <div class="flex items-center justify-between">
    <h3 class="font-display text-2xl">{{ 'about.skill.title' | translate }}</h3>
    @if (authService.isAuthenticated()) {
      <app-skill-add-edit></app-skill-add-edit>
    }
  </div>
  <div class="mt-6 space-y-5">
    @if (isLoaded()) {
      @for (item of skills(); track item) {
        <div class="flex-1">
          <div class="mb-2 flex items-center justify-between text-sm">
            <div class="flex items-center gap-1">
              @if (authService.isAuthenticated()) {
                <app-skill-add-edit [skillData]="item"></app-skill-add-edit>
              }
              <span>{{item.name}}</span>
            </div>
            <span class="text-[var(--text-muted)]">{{item.percentage}}%</span>
          </div>
          <div class="h-3 rounded-full bg-[var(--border-color)]">
            <div class="h-3 rounded-full bg-[var(--accent-color)] transition-all" [style.width]="item.percentage + '%'"></div>
          </div>
        </div>
      }
    }
  </div>
