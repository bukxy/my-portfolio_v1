<section id="home" class="home">
  <div class="intro_sec d-block d-lg-flex align-items-center">
    <div class="h_bg-image order-1 order-lg-2 h-100"
         [style.backgroundImage]="'url(' + introdata.your_img_url + ')'">
    </div>
    <div class="text order-2 order-lg-1 h-100 d-lg-flex justify-content-center">
      <div class="align-self-center">
        <div class="intro mx-auto">
          <h2 class="mb-1x">{{ introdata.title }}</h2>
          <h1 class="fluidz-48 mb-1x">
            <span class="typewriter-text">{{ currentText() }}</span><span class="cursor-blink">|</span>
          </h1>
          <p class="mb-1x">{{ introdata.description }}</p>
          <div class="intro_btn-action pb-5">
            <a routerLink="/portfolio" class="text_2">
              <div id="button_p" class="ac_btn btn">
                Mes projets
                <div class="ring one"></div>
                <div class="ring two"></div>
                <div class="ring three"></div>
              </div>
            </a>
            <a routerLink="/contact">
              <div id="button_h" class="ac_btn btn">
                Me contacter
                <div class="ring one"></div>
                <div class="ring two"></div>
                <div class="ring three"></div>
              </div>
            </a>
            <a [href]="links.cv">
              <div id="button_p" class="ac_btn btn">
                  CV
                  <div class="ring one"></div>
                  <div class="ring two"></div>
                  <div class="ring three"></div>
              </div>
              </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
