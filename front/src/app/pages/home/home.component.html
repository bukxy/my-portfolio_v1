<section id="home" class="page-shell flex items-center min-h-screen">
  <div class="grid w-full items-center gap-8 lg:grid-cols-[1.05fr_0.95fr]">
    <div class="order-2 space-y-6 lg:order-1">
      <div class="space-y-4">
        <h1 class="font-display text-4xl md:text-5xl">{{ 'home.title' | translate }}</h1>
        @if (animatedTexts().length) {
          <ngx-typed-js
            [strings]="animatedTexts()"
            [shuffle]="true"
            [typeSpeed]="80"
            [backSpeed]="50"
            [backDelay]="1500"
            [loop]="true"
            [showCursor]="false"
          >
            <h2 class="fluidz-48 mb-1x text-2xl md:text-5xl my-3 sm:my-6">
              <span class="typing text-[var(--color-error)]"></span>
              <span class="cursor-blink text-[var(--color-error)]">|</span>
            </h2>
          </ngx-typed-js>
        }
        <p class="max-w-2xl text-base leading-7 text-[var(--text-muted)] md:text-lg">{{ 'home.description' | translate }}</p>
        <div class="flex flex-wrap gap-4">
          <a routerLink="/portfolio" class="primary-btn">
            {{ 'home.button.project' | translate }}
          </a>
          <a [href]="links.cv" class="secondary-btn">
            {{ 'home.button.cv' | translate }}
            </a>
        </div>
      </div>
    </div>

    <div class="order-1 lg:order-2">
      <div class="card-surface overflow-hidden p-3">
        <div class="min-h-[360px] rounded-[1.4rem] bg-cover bg-center md:min-h-[540px]"
             [style.backgroundImage]="'url(' + introdata.your_img_url + ')'"
        >
        </div>
      </div>
    </div>
  </div>
</section>
