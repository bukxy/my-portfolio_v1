<section class="page-shell">
  <div class="mb-12">
    <h1 class="section-title">{{ 'navigation.contact' | translate }}</h1>
    <div class="section-divider"></div>
  </div>

  <div class="card-surface p-6 md:p-8 max-w-6xl mx-auto">
    <p class="leading-7 text-[var(--text-muted)]" style="white-space: pre-line" [innerHTML]="'contact.content' | translate"></p>
    <hr class="my-6 border-[var(--border-color)]" />

    <div class="flex flex-wrap gap-4">
      @for (item of socialprofils; track item.name) {
        <a
        [href]="item.url"
          target="_blank"
          rel="noopener noreferrer"
          (click)="$event.stopPropagation()"
          class="inline-flex items-center gap-2 text-sm font-semibold social-link"
          >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5 fill-current">
          <path [attr.d]="item.icon"/>
        </svg>
        {{ item.name }}
        </a>
      }
    </div>
  </div>
</section>
