services:

  # -- Frontend Angular (hot-reload) -----------------------------------------
  front:
    build:
      context: ..
      dockerfile: docker/Dockerfile.front-dev
    container_name: portfolio-front-dev
    ports:
      - "4200:4200"
    volumes:
      - ../front:/app                        # mount du code source
      - front_node_modules:/app/node_modules                    # évite d'écraser node_modules du conteneur
    networks:
      - portfolio-net
    restart: unless-stopped

  # -- Backend Java (hot-reload) ----------------------------------------------
  back:
    build:
      context: ..
      dockerfile: docker/Dockerfile.back-dev
    container_name: portfolio-back-dev
    ports:
      - "8080:8080"
    volumes:
      - ../back:/app                         # mount du code source
      - /app/target                          # évite d'écraser le target du conteneur
      - maven-cache:/root/.m2                # cache Maven persistant
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - portfolio-net
    restart: unless-stopped

  # -- PostgreSQL ---------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: portfolio-postgres-dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - portfolio-net
    restart: unless-stopped

networks:
  portfolio-net:
    driver: bridge

volumes:
  front_node_modules:
  maven-cache:
  postgres-data: