services:

  # -- Frontend Angular -------------------------------------------------------
  front:
    build:
      context: ..
      dockerfile: docker/Dockerfile.front-prod
    container_name: portfolio-front
    ports:
      - "8091:80"       # Nginx host redirigera vers ce port
    networks:
      - portfolio-net
    depends_on:
      - back
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -- Backend Java -----------------------------------------------------------
  back:
    build:
      context: ..
      dockerfile: docker/Dockerfile.back-prod
    container_name: portfolio-back
    ports:
      - "8092:8080"     # Nginx host redirigera vers ce port pour /api
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - portfolio-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # -- PostgreSQL ----------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: portfolio-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - portfolio-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  portfolio-net:
    driver: bridge

volumes:
  postgres-data: